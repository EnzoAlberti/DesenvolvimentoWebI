<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicío 08</title>
    <style>
        h1{
            font-size: 32px;
            color: white;
            background-color: black;
            text-align: center;
        }
        h2{
            color:red;
            font-style: italic;
        }
        .sla{
            color:blue;
        }
        .sal{
            color:green;
        }
        .fim{
            font-size:15px;
        }
    </style>
</head>
<body>
    <h1>Brasil</h1>
    <h2>Conhecendo o Brasil</h2>
    <hr>
    <div class="sla">
        <p>São Paulo</p>
        <p>Rio de Janeiro</p>
        <p>Minas Gerais</p>
        <p>Espirito Santo</p>
    </div>

    <div class="sal">
        <p>Paraná</p>
        <p>Santa Catarina</p>
        <p>Rio Grande do Sul</p>
    </div>
    <hr>
    <div name="fim">
        <p>Desenvolvido por Junior</p>
    </div>
</body>
</html>
